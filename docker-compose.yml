services:
  postgres:
    image: postgres:16
    container_name: task_manager_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: task_manager
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: task_manager_redis
    restart: always
    ports:
      - '6379:6379'

  mailpit:
    image: axllent/mailpit:latest
    container_name: task_manager_mailpit
    restart: always
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_data:
